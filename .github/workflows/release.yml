name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  # Build on each platform without publishing; artifacts are uploaded to the
  # workflow run so the publish job can attach them to one GitHub Release.
  build:
    needs: check
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      # pacman target needs bsdtar for the .MTREE manifest
      - name: Install Linux build dependencies
        if: matrix.platform == 'linux'
        run: sudo apt-get install -y libarchive-tools

      # macOS signing + notarization are optional until the secrets exist:
      # with no CSC_LINK, electron-builder produces an unsigned build (fine
      # for direct download; auto-update on macOS requires signing). With no
      # APPLE_* credentials, notarization is skipped. The same Developer ID
      # certificate used for Netscope works here — it signs any app from the
      # same team.
      - name: Build (macOS)
        if: matrix.platform == 'mac'
        env:
          CSC_LINK: ${{ secrets.MAC_CERTIFICATE_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-vite build && npx electron-builder --mac --publish never

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-vite build && npx electron-builder --linux --publish never

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.AppImage
            dist/*.pacman
            dist/*.yml
            dist/*.yaml
          if-no-files-found: error
          retention-days: 1

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List release artifacts
        run: ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
