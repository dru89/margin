<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Margin app icon — a manuscript page with a live margin.
       Catppuccin Mocha ground, Latte page, blue author rule,
       teal agent comment dot, yellow highlight. -->
  <defs>
    <clipPath id="squircle">
      <rect x="0" y="0" width="512" height="512" rx="112"/>
    </clipPath>
  </defs>
  <g clip-path="url(#squircle)">
    <rect width="512" height="512" fill="#1e1e2e"/>
    <!-- page -->
    <rect x="88" y="64" width="336" height="448" rx="18" fill="#eff1f5"/>
    <!-- margin rule (author blue) -->
    <line x1="160" y1="64" x2="160" y2="512" stroke="#89b4fa" stroke-width="6"/>
    <!-- text lines -->
    <g fill="#9ca0b0">
      <rect x="184" y="122" width="200" height="16" rx="8"/>
      <rect x="184" y="166" width="168" height="16" rx="8"/>
      <rect x="184" y="254" width="184" height="16" rx="8"/>
      <rect x="184" y="298" width="140" height="16" rx="8"/>
      <rect x="184" y="342" width="192" height="16" rx="8"/>
      <rect x="184" y="430" width="156" height="16" rx="8"/>
    </g>
    <!-- highlighted (commented) line -->
    <rect x="176" y="202" width="196" height="32" rx="8" fill="#f9e2af"/>
    <rect x="184" y="210" width="180" height="16" rx="8" fill="#7c7f93"/>
    <!-- agent comment dot in the margin -->
    <circle cx="126" cy="218" r="22" fill="#94e2d5"/>
    <circle cx="126" cy="386" r="14" fill="#89b4fa"/>
    <!-- suggestion line (teal) -->
    <rect x="176" y="378" width="164" height="32" rx="8" fill="#94e2d51f" stroke="#94e2d5" stroke-width="4" stroke-dasharray="10 8"/>
  </g>
</svg>
